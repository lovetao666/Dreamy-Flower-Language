<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>梦幻花语</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}
:root{
  --bg:#1a0f2e;--panel:#2a1a42;--card:#3a2558;--border:#5a3d80;
  --green:#76d59a;--yellow:#ffd36e;--red:#ff7070;--pink:#ff6fae;--purple:#c084fc;--blue:#7aa7ff;
  --gold:#ffd36e;--text:#f0e6ff;--muted:#a080c0;
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Microsoft YaHei",sans-serif;color:var(--text)}
body{display:flex;flex-direction:column;align-items:center;height:100%}

/* ---- TOP BAR ---- */
#topbar{
  width:100%;max-width:480px;flex-shrink:0;
  height:52px;padding:0 14px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  background:rgba(42,26,66,0.96);border-bottom:1px solid var(--border);
}
.top-info{display:flex;align-items:center;gap:6px;font-size:0.82rem;font-weight:700}
.top-info span{opacity:.7;font-weight:400}
#stamina-bar-wrap{display:flex;align-items:center;gap:6px;flex:1;min-width:0}
.stamina-track{flex:1;height:10px;border-radius:999px;background:rgba(255,255,255,0.1);overflow:hidden}
#stamina-fill{height:100%;border-radius:999px;background:var(--green);transition:width .4s,background .4s}
#stamina-text{font-size:0.75rem;white-space:nowrap;min-width:52px;text-align:right;color:var(--muted)}
.gold-wrap{display:flex;align-items:center;gap:4px;font-size:0.88rem;font-weight:800;color:var(--gold);white-space:nowrap}
.lv-wrap{display:flex;align-items:center;gap:4px;font-size:0.78rem;color:var(--purple)}

/* ---- MIDDLE SCROLL ---- */
#mid{width:100%;max-width:480px;flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;padding:10px 10px 4px}
#mid::-webkit-scrollbar{width:4px}
#mid::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ---- FLOWERBEDS ---- */
#flowerbeds{display:flex;gap:10px;margin-bottom:10px}
.flowerbed{
  flex:1;padding:10px 8px 8px;border-radius:16px;
  background:var(--panel);border:1.5px solid var(--border);
  display:flex;flex-direction:column;align-items:center;gap:4px;
  cursor:pointer;position:relative;transition:transform .15s;
}
.flowerbed:active{transform:scale(0.95)}
.fb-icon{font-size:2rem;line-height:1}
.fb-label{font-size:0.72rem;font-weight:700;color:var(--muted)}
.fb-count{
  position:absolute;top:6px;right:8px;
  min-width:20px;height:20px;border-radius:999px;
  background:var(--pink);color:#fff;font-size:0.7rem;font-weight:900;
  display:flex;align-items:center;justify-content:center;padding:0 4px;
}
.fb-timer{font-size:0.7rem;color:var(--muted)}
.fb-ready{color:var(--green);font-weight:800;font-size:0.78rem;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* ---- MERGE BOARD ---- */
#board-wrap{background:var(--panel);border-radius:16px;border:1.5px solid var(--border);padding:8px;margin-bottom:10px}
#board-title{font-size:0.78rem;font-weight:700;color:var(--muted);margin-bottom:6px;padding:0 2px}
#board{
  display:grid;grid-template-columns:repeat(6,1fr);gap:4px;
  touch-action:none;
}
.cell{
  aspect-ratio:1;border-radius:10px;
  background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,255,255,0.08);
  display:flex;align-items:center;justify-content:center;
  position:relative;transition:background .15s,border-color .15s;
}
.cell.drag-over{background:rgba(255,255,255,0.15);border-color:var(--blue)}
.item{
  width:82%;height:82%;border-radius:8px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-size:1.45rem;line-height:1;cursor:grab;
  transition:transform .15s;position:relative;
  background:rgba(255,255,255,0.07);
}
.item:active{cursor:grabbing}
.item.dragging{opacity:.4}
.item.max-level::after{
  content:"★";position:absolute;top:-4px;right:-4px;
  font-size:0.6rem;background:var(--gold);color:#3a1a00;
  border-radius:4px;padding:1px 3px;font-weight:900;
}
.item-lv{position:absolute;bottom:1px;right:3px;font-size:0.55rem;color:var(--muted);font-weight:700}
.merge-flash{animation:mergeAnim .45s ease-out forwards}
@keyframes mergeAnim{0%{transform:scale(0.3);opacity:0}60%{transform:scale(1.25)}100%{transform:scale(1);opacity:1}}

/* ---- ORDERS ---- */
#orders-wrap{background:var(--panel);border-radius:16px;border:1.5px solid var(--border);padding:8px;margin-bottom:10px}
#orders-title{font-size:0.78rem;font-weight:700;color:var(--muted);margin-bottom:6px;padding:0 2px}
#orders{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.order-slot{
  border-radius:12px;border:1.5px solid var(--border);
  background:rgba(255,255,255,0.04);padding:8px 6px;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  position:relative;min-height:100px;cursor:pointer;
  transition:border-color .2s,background .2s;
}
.order-slot.drop-target{border-color:var(--green);background:rgba(118,213,154,0.08)}
.order-slot.done{opacity:.5;cursor:default}
.order-demand{font-size:1.2rem;line-height:1}
.order-need{font-size:0.65rem;color:var(--muted);text-align:center;line-height:1.4}
.order-reward{font-size:0.7rem;color:var(--gold);font-weight:700}
.order-progress{font-size:0.7rem;color:var(--green);font-weight:700}
.order-check{position:absolute;top:4px;right:6px;font-size:0.9rem}

/* ---- EXP BAR ---- */
#exp-wrap{background:var(--panel);border-radius:12px;border:1.5px solid var(--border);padding:8px 10px;margin-bottom:10px}
.exp-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;font-size:0.72rem}
.exp-track{height:8px;border-radius:999px;background:rgba(255,255,255,0.08);overflow:hidden}
#exp-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--purple),var(--pink));transition:width .5s}

/* ---- TOAST ---- */
#toast{
  position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-20px);
  background:rgba(255,255,255,0.95);color:#2a1438;
  padding:9px 18px;border-radius:14px;font-size:0.82rem;font-weight:600;
  z-index:100;pointer-events:none;opacity:0;transition:opacity .25s,transform .25s;
  white-space:nowrap;max-width:280px;text-align:center;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ---- FLOAT TEXT ---- */
.float-text{
  position:fixed;pointer-events:none;z-index:200;
  font-size:1.1rem;font-weight:900;color:var(--gold);
  animation:floatUp .9s ease-out forwards;
}
@keyframes floatUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-60px)}}

/* ---- MODAL ---- */
#modal-mask{
  position:fixed;inset:0;z-index:50;background:rgba(0,0,0,0.55);
  display:none;align-items:center;justify-content:center;padding:24px;
}
#modal-mask.show{display:flex}
.modal{
  width:100%;max-width:320px;background:var(--panel);border:1.5px solid var(--border);
  border-radius:22px;padding:24px;text-align:center;
}
.modal h2{margin-bottom:8px;font-size:1.2rem}
.modal p{color:var(--muted);font-size:0.85rem;margin-bottom:18px;line-height:1.6}
.modal .rewards{font-size:1.4rem;margin-bottom:16px}
.modal-btn{
  border:0;border-radius:12px;padding:12px 24px;
  font-size:0.95rem;font-weight:800;cursor:pointer;width:100%;
  background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div class="top-info">🌸<span>梦幻花语</span></div>
  <div id="stamina-bar-wrap">
    <span style="font-size:1rem">♥</span>
    <div class="stamina-track"><div id="stamina-fill"></div></div>
    <div id="stamina-text"></div>
  </div>
  <div class="gold-wrap">🪙<span id="gold-val">0</span></div>
  <div class="lv-wrap">Lv.<span id="lv-val">1</span></div>
</div>

<!-- SCROLL AREA -->
<div id="mid">

  <!-- FLOWERBEDS -->
  <div id="flowerbeds">
    <div class="flowerbed" id="fb0" onclick="harvestFlowerbed(0)">
      <div class="fb-icon">🌱</div>
      <div class="fb-label">花圃 1</div>
      <div class="fb-timer" id="fb0-timer">-</div>
    </div>
    <div class="flowerbed" id="fb1" onclick="harvestFlowerbed(1)">
      <div class="fb-icon">🌱</div>
      <div class="fb-label">花圃 2</div>
      <div class="fb-timer" id="fb1-timer">-</div>
    </div>
  </div>

  <!-- MERGE BOARD -->
  <div id="board-wrap">
    <div id="board-title">合成盘 · 拖动同级花朵合成升级</div>
    <div id="board"></div>
  </div>

  <!-- ORDERS -->
  <div id="orders-wrap">
    <div id="orders-title">📦 订单（拖动花朵到订单槽完成订单）</div>
    <div id="orders"></div>
  </div>

  <!-- EXP -->
  <div id="exp-wrap">
    <div class="exp-row">
      <span style="font-size:.78rem;color:var(--purple);font-weight:700">经验值</span>
      <span id="exp-text" style="font-size:.72rem;color:var(--muted)">0 / 20</span>
    </div>
    <div class="exp-track"><div id="exp-fill" style="width:0%"></div></div>
  </div>

</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- MODAL -->
<div id="modal-mask">
  <div class="modal">
    <h2 id="modal-title">🎉 订单完成！</h2>
    <div class="rewards" id="modal-rewards"></div>
    <p id="modal-msg"></p>
    <button class="modal-btn" onclick="closeModal()">太棒了！</button>
  </div>
</div>

<script>
/* ============================================================
   CONFIG
============================================================ */
const FLOWERS = [
  {level:1, name:'小花苗', icon:'🌱', gold:5,  exp:2},
  {level:2, name:'小花朵', icon:'🌸', gold:15, exp:5},
  {level:3, name:'盛开花', icon:'🌺', gold:40, exp:12},
  {level:4, name:'稀有花', icon:'💐', gold:100,exp:30},
  {level:5, name:'梦幻花', icon:'🌟', gold:250,exp:80},
];
const MAX_LEVEL = 5;
const BOARD_SIZE = 36;
const STAMINA_MAX = 100;
const STAMINA_RECOVER_SEC = 300; // 5min → demo用30s
const STAMINA_RECOVER_SEC_DEMO = 30; // 演示加速
const FB_INTERVAL_SEC = 60;
const FB_INTERVAL_DEMO = 15; // 演示加速
const FB_MAX_STORAGE = 3;
const EXP_NEED = [0, 20, 50, 100, 200]; // level 1-5

const LV_ORDER_MAX = [0, 2, 2, 3, 4, 5]; // 各等级订单可需求最高花级

/* ============================================================
   STATE
============================================================ */
let state = {
  stamina: STAMINA_MAX,
  lastStaminaTime: Date.now(),
  gold: 0,
  exp: 0,
  playerLevel: 1,
  board: Array(BOARD_SIZE).fill(null), // null | {level}
  orders: [],
  flowerbeds: [
    {storage:0, lastTime: Date.now()},
    {storage:0, lastTime: Date.now()},
  ],
};

let dragState = null; // {fromCell, item}
let idCounter = 0;
function newItem(level){ return {id: ++idCounter, level}; }

/* ============================================================
   INIT
============================================================ */
function init(){
  // 初始给几朵花
  placeItem(0, newItem(1));
  placeItem(1, newItem(1));
  placeItem(2, newItem(1));
  placeItem(3, newItem(2));
  generateOrders();
  render();
  tick();
  setInterval(tick, 1000);
}

/* ============================================================
   PLACE / REMOVE
============================================================ */
function placeItem(cellIdx, item){
  state.board[cellIdx] = item;
}
function firstEmpty(){
  return state.board.findIndex(c => c === null);
}
function boardFull(){
  return state.board.every(c => c !== null);
}

/* ============================================================
   ORDERS
============================================================ */
function generateOrders(){
  state.orders = [];
  for(let i=0;i<3;i++) state.orders.push(makeOrder(i));
}
function makeOrder(slot){
  const maxLv = LV_ORDER_MAX[Math.min(state.playerLevel, 5)];
  const needLv = Math.max(1, Math.floor(Math.random() * maxLv) + 1);
  const needCount = needLv <= 2 ? (Math.random() < 0.5 ? 1 : 2) : 1;
  const baseFl = FLOWERS[needLv-1];
  const gold = baseFl.gold * needCount;
  const exp  = baseFl.exp  * needCount;
  return {slot, needLevel: needLv, total: needCount, submitted: 0, gold, exp, done:false};
}
function refreshOrder(slot){
  state.orders[slot] = makeOrder(slot);
}

/* ============================================================
   SUBMIT TO ORDER (drag flower → order)
============================================================ */
function submitToOrder(orderIdx, fromCell){
  const order = state.orders[orderIdx];
  const item = state.board[fromCell];
  if(!order || order.done || !item) return false;
  if(item.level !== order.needLevel){
    showToast('这个订单不需要这种花 🌸');
    return false;
  }
  // match
  state.board[fromCell] = null;
  order.submitted++;
  if(order.submitted >= order.total){
    order.done = true;
    state.gold += order.gold;
    state.exp  += order.exp;
    checkLevelUp();
    showModal(
      '🎉 订单完成！',
      `🪙 +${order.gold} 金币　✨ +${order.exp} 经验`,
      `新订单已刷新，继续合成吧！`
    );
    setTimeout(()=>{ refreshOrder(orderIdx); render(); }, 1200);
  }
  render();
  return true;
}

/* ============================================================
   MERGE
============================================================ */
function tryMerge(fromCell, toCell){
  if(fromCell === toCell) return;
  const a = state.board[fromCell];
  const b = state.board[toCell];
  if(!a || !b) return;
  if(a.level !== b.level){ showToast('等级不同，无法合成'); return; }
  if(a.level >= MAX_LEVEL){ showToast('已经是最高等级了 ✨'); return; }
  if(state.stamina <= 0){ showToast('体力不足，休息一下再来合成吧 ♥'); return; }
  // merge!
  state.stamina--;
  state.board[fromCell] = null;
  const newLv = a.level + 1;
  state.board[toCell] = newItem(newLv);
  state.board[toCell]._new = true;
  showFloatText(`+1 ${FLOWERS[newLv-1].name}!`);
  if(newLv === MAX_LEVEL) showToast('🌟 合成出梦幻花！满级了！');
  render();
}

/* ============================================================
   FLOWERBED
============================================================ */
function harvestFlowerbed(idx){
  const fb = state.flowerbeds[idx];
  if(fb.storage <= 0){ showToast('花圃还在生长中…'); return; }
  if(boardFull()){ showToast('合成盘满了，先合一些物品吧'); return; }
  const count = fb.storage;
  let placed = 0;
  for(let i=0;i<count;i++){
    const empty = firstEmpty();
    if(empty === -1) break;
    placeItem(empty, newItem(1));
    placed++;
  }
  fb.storage -= placed;
  fb.lastTime = Date.now();
  showFloatText(`+${placed} 小花苗`);
  render();
}

/* ============================================================
   LEVEL UP
============================================================ */
function checkLevelUp(){
  const need = EXP_NEED[Math.min(state.playerLevel, EXP_NEED.length-1)];
  const nextNeed = EXP_NEED[Math.min(state.playerLevel+1-1, EXP_NEED.length-1)];
  // find how much exp needed for next level
  const levels = [0,20,50,100,200];
  if(state.playerLevel < 5){
    const threshold = levels[state.playerLevel]; // exp needed to reach next
    if(state.exp >= threshold){
      state.playerLevel = Math.min(5, state.playerLevel+1);
      state.stamina = STAMINA_MAX;
      showToast(`🎊 升级啦！Lv.${state.playerLevel} 体力已回满！`);
    }
  }
}

/* ============================================================
   TICK (1s)
============================================================ */
function tick(){
  const now = Date.now();

  // stamina recovery (demo: 30s per point)
  const elapsedStamina = (now - state.lastStaminaTime) / 1000;
  if(state.stamina < STAMINA_MAX){
    const recover = Math.floor(elapsedStamina / STAMINA_RECOVER_SEC_DEMO);
    if(recover > 0){
      state.stamina = Math.min(STAMINA_MAX, state.stamina + recover);
      state.lastStaminaTime = now;
    }
  } else {
    state.lastStaminaTime = now;
  }

  // flowerbed produce (demo: 15s)
  for(const fb of state.flowerbeds){
    if(fb.storage < FB_MAX_STORAGE){
      const elapsed = (now - fb.lastTime) / 1000;
      const produced = Math.floor(elapsed / FB_INTERVAL_DEMO);
      if(produced > 0){
        fb.storage = Math.min(FB_MAX_STORAGE, fb.storage + produced);
        fb.lastTime = now;
      }
    }
  }

  renderTopBar();
  renderFlowerbeds();
}

/* ============================================================
   RENDER
============================================================ */
function render(){
  renderTopBar();
  renderFlowerbeds();
  renderBoard();
  renderOrders();
  renderExp();
}

function renderTopBar(){
  const pct = (state.stamina / STAMINA_MAX * 100).toFixed(1);
  document.getElementById('stamina-fill').style.width = pct + '%';
  const fill = document.getElementById('stamina-fill');
  fill.style.background = state.stamina > 50 ? 'var(--green)' : state.stamina > 20 ? 'var(--yellow)' : 'var(--red)';
  document.getElementById('stamina-text').textContent = `${state.stamina}/${STAMINA_MAX}`;
  document.getElementById('gold-val').textContent = state.gold;
  document.getElementById('lv-val').textContent = state.playerLevel;
}

function renderFlowerbeds(){
  const now = Date.now();
  state.flowerbeds.forEach((fb,i)=>{
    const el = document.getElementById('fb'+i);
    const timerEl = document.getElementById('fb'+i+'-timer');
    const icon = el.querySelector('.fb-icon');
    // count badge
    let badge = el.querySelector('.fb-count');
    if(!badge){ badge=document.createElement('div'); badge.className='fb-count'; el.appendChild(badge); }
    if(fb.storage > 0){
      badge.textContent = fb.storage === FB_MAX_STORAGE ? 'MAX' : fb.storage;
      badge.style.display='flex';
      icon.textContent = '🌸';
      timerEl.className = 'fb-ready';
      timerEl.textContent = '点击收取';
    } else {
      badge.style.display='none';
      icon.textContent = '🌱';
      timerEl.className = 'fb-timer';
      const elapsed = (now - fb.lastTime) / 1000;
      const remain = Math.max(0, Math.ceil(FB_INTERVAL_DEMO - elapsed % FB_INTERVAL_DEMO));
      timerEl.textContent = `${remain}s 后产出`;
    }
  });
}

function renderBoard(){
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';
  for(let i=0;i<BOARD_SIZE;i++){
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.dataset.idx = i;
    const item = state.board[i];
    if(item){
      const fl = FLOWERS[item.level-1];
      const div = document.createElement('div');
      div.className = 'item' + (item.level === MAX_LEVEL ? ' max-level' : '') + (item._new ? ' merge-flash' : '');
      div.dataset.cell = i;
      div.innerHTML = `${fl.icon}<span class="item-lv">Lv${item.level}</span>`;
      div.title = fl.name;
      if(item._new) { delete item._new; setTimeout(()=>div.classList.remove('merge-flash'),450); }

      // pointer events for drag
      div.addEventListener('pointerdown', e => onPointerDown(e, i));
      cell.appendChild(div);
    }
    // drop events on cell
    cell.addEventListener('pointerenter', e => onCellEnter(e, i));
    cell.addEventListener('pointerup',    e => onPointerUp(e, i));
    boardEl.appendChild(cell);
  }
}

function renderOrders(){
  const ordersEl = document.getElementById('orders');
  ordersEl.innerHTML = '';
  state.orders.forEach((o,i)=>{
    const fl = FLOWERS[o.needLevel-1];
    const div = document.createElement('div');
    div.className = 'order-slot' + (o.done ? ' done' : '');
    div.dataset.order = i;
    div.innerHTML = `
      <div class="order-demand">${fl.icon}</div>
      <div class="order-need">${fl.name}<br>Lv${o.needLevel}</div>
      <div class="order-progress">${o.done?'✅ 完成':o.submitted>0?`${o.submitted}/${o.total}`:`需要×${o.total}`}</div>
      <div class="order-reward">🪙${o.gold} ✨${o.exp}</div>
    `;
    if(!o.done){
      div.addEventListener('pointerup', e => onOrderDrop(e, i));
      div.addEventListener('pointerenter', e => {
        if(dragState) div.classList.add('drop-target');
      });
      div.addEventListener('pointerleave', () => div.classList.remove('drop-target'));
    }
    ordersEl.appendChild(div);
  });
}

function renderExp(){
  const levels = [0,20,50,100,200];
  const lv = state.playerLevel;
  const cur = lv < 5 ? state.exp : 200;
  const need = lv < 5 ? levels[lv] : 200;
  const pct = Math.min(100, (cur/need*100)).toFixed(1);
  document.getElementById('exp-fill').style.width = pct + '%';
  document.getElementById('exp-text').textContent = `${cur} / ${need}`;
}

/* ============================================================
   DRAG & DROP (pointer events)
============================================================ */
let ghostEl = null;

function onPointerDown(e, cellIdx){
  if(!state.board[cellIdx]) return;
  e.preventDefault();
  dragState = {fromCell: cellIdx};
  // mark dragging
  const itemEl = e.currentTarget;
  itemEl.classList.add('dragging');
  // create ghost
  ghostEl = itemEl.cloneNode(true);
  ghostEl.classList.remove('dragging');
  ghostEl.style.cssText = `
    position:fixed;z-index:999;pointer-events:none;opacity:.85;
    width:${itemEl.offsetWidth}px;height:${itemEl.offsetHeight}px;
    transition:none;transform:scale(1.15);
  `;
  document.body.appendChild(ghostEl);
  moveGhost(e);
  document.addEventListener('pointermove', onPointerMove);
  document.addEventListener('pointerup',   onPointerUpGlobal);
}

function onPointerMove(e){
  if(!dragState) return;
  moveGhost(e);
}
function moveGhost(e){
  if(!ghostEl) return;
  const x = (e.clientX || e.touches?.[0]?.clientX || 0);
  const y = (e.clientY || e.touches?.[0]?.clientY || 0);
  ghostEl.style.left = (x - ghostEl.offsetWidth/2) + 'px';
  ghostEl.style.top  = (y - ghostEl.offsetHeight/2) + 'px';
}

function onCellEnter(e, cellIdx){
  if(!dragState) return;
  document.querySelectorAll('.cell').forEach(c=>c.classList.remove('drag-over'));
  const cellEl = document.querySelector(`.cell[data-idx="${cellIdx}"]`);
  if(cellEl) cellEl.classList.add('drag-over');
}

function onPointerUp(e, cellIdx){
  if(!dragState) return;
  e.preventDefault();
  const from = dragState.fromCell;
  endDrag();
  if(from === cellIdx){
    // tapped in place — no-op
    return;
  }
  const target = state.board[cellIdx];
  if(target){
    tryMerge(from, cellIdx);
  } else {
    // move to empty cell
    state.board[cellIdx] = state.board[from];
    state.board[from] = null;
    render();
  }
}

function onOrderDrop(e, orderIdx){
  if(!dragState) return;
  e.preventDefault();
  e.stopPropagation();
  const from = dragState.fromCell;
  endDrag();
  submitToOrder(orderIdx, from);
}

function onPointerUpGlobal(e){
  if(!dragState) return;
  endDrag();
}

function endDrag(){
  if(ghostEl){ ghostEl.remove(); ghostEl = null; }
  document.querySelectorAll('.cell').forEach(c=>c.classList.remove('drag-over'));
  document.querySelectorAll('.order-slot').forEach(c=>c.classList.remove('drop-target'));
  document.querySelectorAll('.item.dragging').forEach(c=>c.classList.remove('dragging'));
  document.removeEventListener('pointermove', onPointerMove);
  document.removeEventListener('pointerup',   onPointerUpGlobal);
  dragState = null;
}

/* ============================================================
   TOAST / FLOAT / MODAL
============================================================ */
let toastTO = null;
function showToast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTO);
  toastTO = setTimeout(()=>el.classList.remove('show'), 2200);
}

function showFloatText(msg){
  const el = document.createElement('div');
  el.className = 'float-text';
  el.textContent = msg;
  el.style.left = (window.innerWidth/2 - 60) + 'px';
  el.style.top  = (window.innerHeight/2 - 40) + 'px';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 950);
}

let modalCloseCallback = null;
function showModal(title, rewards, msg, cb){
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-rewards').textContent = rewards;
  document.getElementById('modal-msg').textContent = msg;
  document.getElementById('modal-mask').classList.add('show');
  modalCloseCallback = cb || null;
}
function closeModal(){
  document.getElementById('modal-mask').classList.remove('show');
  if(modalCloseCallback){ modalCloseCallback(); modalCloseCallback=null; }
}

/* ============================================================
   START
============================================================ */
init();
</script>
